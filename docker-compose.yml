services:
  localstack:
    image: localstack/localstack:4
    env_file: .env
    ports:
      - '4566:4566'
    environment:
      - DEBUG=${LOCALSTACK_DEBUG:-0}
    volumes:
      - 'localstack-data:/var/lib/localstack'
      - '/var/run/docker.sock:/var/run/docker.sock'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  localstack-data:
